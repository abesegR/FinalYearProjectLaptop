spring.application.name=chat-backend

# Claude API configuration
anthropic.api.enabled=true
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.version=2023-06-01
anthropic.api.model=claude-sonnet-4-5
anthropic.api.max-tokens=350
anthropic.api.temperature=0.2

# Optional override (single line). Leave blank to use the built-in prompt in ClaudeService.java.
anthropic.api.system-prompt=

# Default local database for development/tests
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}
