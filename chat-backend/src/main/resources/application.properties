spring.application.name=chat-backend

# Claude API configuration
anthropic.api.enabled=${ANTHROPIC_API_ENABLED:true}
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.version=2023-06-01
anthropic.api.model=claude-sonnet-4-5
anthropic.api.max-tokens=350
anthropic.api.temperature=0.2

# Optional override (single line). Leave blank to use the built-in prompt in ClaudeService.java.
anthropic.api.system-prompt=

# Default local database for development/tests
spring.datasource.url=jdbc:mysql://localhost:3306/laptopai
spring.datasource.username=root
spring.datasource.password=Abeseg@2002
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true